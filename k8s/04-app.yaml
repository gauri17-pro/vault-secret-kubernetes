apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-db-app
  namespace: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-db-app
  template:
    metadata:
      labels:
        app: vault-db-app
    spec:
      containers:
        - name: vault-db-app
          image: gauri17-pro/vault-db-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: postgres-service
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-app-secrets
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vault-db-app-service
  namespace: my-app
spec:
  selector:
    app: vault-db-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
