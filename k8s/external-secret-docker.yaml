apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docker-creds
  namespace: my-app
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-cluster-secret-store
    kind: ClusterSecretStore

  target:
    name: docker-creds
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "username": "{{ .docker_username }}",
                "password": "{{ .docker_password }}",
                "auth": "{{ printf "%s:%s" .docker_username .docker_password | b64enc }}"
              }
            }
          }

  data:
    - secretKey: docker_username
      remoteRef:
        key: docker-creds
        property: docker_username

    - secretKey: docker_password
      remoteRef:
        key: docker-creds
        property: docker_password